<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rassegna Energia Italia</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0e1a;
      --surface: #111827;
      --surface2: #1a2235;
      --border: #1e2d45;
      --accent: #f97316;
      --accent2: #38bdf8;
      --accent3: #a3e635;
      --text: #e2e8f0;
      --text-muted: #64748b;
      --text-dim: #94a3b8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(56,189,248,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(56,189,248,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* HEADER */
    header {
      position: relative;
      z-index: 10;
      padding: 2.5rem 2rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      background: linear-gradient(180deg, rgba(249,115,22,0.06) 0%, transparent 100%);
    }

    .logo-area h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      letter-spacing: -0.03em;
      line-height: 1.1;
      color: #fff;
    }

    .logo-area h1 span { color: var(--accent); }

    .logo-area p {
      margin-top: 0.4rem;
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 300;
      letter-spacing: 0.04em;
    }

    .header-meta {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .badge {
      font-family: 'Syne', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.3rem 0.7rem;
      border-radius: 2px;
      border: 1px solid;
    }

    .badge-live {
      color: var(--accent3);
      border-color: var(--accent3);
      animation: pulse-badge 2s ease-in-out infinite;
    }

    @keyframes pulse-badge {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .badge-count {
      color: var(--accent2);
      border-color: var(--accent2);
    }

    /* MAIN */
    .feed-area {
      position: relative;
      z-index: 1;
      padding: 1.5rem 2rem 4rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    /* STATUS BAR */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    .status-info {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .status-info strong { color: var(--text); font-weight: 500; }

    .refresh-btn {
      font-family: 'Syne', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent2);
      background: none;
      border: 1px solid var(--accent2);
      padding: 0.4rem 0.9rem;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .refresh-btn:hover { background: var(--accent2); color: var(--bg); }
    .refresh-btn.loading { opacity: 0.5; cursor: not-allowed; }

    /* SKELETON */
    .loading-grid { display: grid; gap: 1px; }

    .skeleton {
      background: var(--surface);
      animation: shimmer 1.5s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    .skeleton-card {
      height: 100px;
      border-left: 3px solid var(--border);
      padding: 1rem 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .skeleton-line { border-radius: 3px; background: var(--border); }

    /* ARTICLES */
    .articles-grid {
      display: grid;
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
    }

    .article-card {
      background: var(--surface);
      padding: 1.1rem 1.3rem;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.5rem;
      align-items: start;
      transition: background 0.15s;
      text-decoration: none;
      color: inherit;
    }

    .article-card:hover { background: var(--surface2); }

    .article-source-tag {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-family: 'Syne', sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.4rem;
    }

    .article-source-tag .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .article-title {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      line-height: 1.4;
      color: var(--text);
      margin-bottom: 0.3rem;
    }

    .article-desc {
      font-size: 0.78rem;
      color: var(--text-muted);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .article-meta { text-align: right; flex-shrink: 0; }

    .article-date {
      font-size: 0.72rem;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .article-arrow {
      margin-top: 0.5rem;
      color: var(--border);
      font-size: 1rem;
      transition: color 0.15s;
      text-align: right;
    }

    .article-card:hover .article-arrow { color: var(--accent); }

    /* Dot colors */
    .dot-orange  { background: #f97316; }
    .dot-blue    { background: #38bdf8; }
    .dot-purple  { background: #a78bfa; }
    .dot-green   { background: #a3e635; }
    .dot-red     { background: #f87171; }
    .dot-yellow  { background: #fbbf24; }

    /* EMPTY / ERROR */
    .empty-state {
      padding: 4rem 2rem;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.85rem;
      line-height: 1.8;
    }

    /* RESPONSIVE */
    @media (max-width: 600px) {
      header { padding: 1.5rem 1rem 1rem; }
      .feed-area { padding: 1rem 1rem 3rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-area">
    <h1>⚡ Rassegna <span>Energia</span> Italia</h1>
    <p>Aggregatore notizie · Mercati energetici · Aggiornamento in tempo reale</p>
  </div>
  <div class="header-meta">
    <span class="badge badge-live">● Live</span>
    <span class="badge badge-count" id="total-badge">— articoli</span>
  </div>
</header>

<div class="feed-area">
  <div class="status-bar">
    <div class="status-info" id="status-info">Caricamento in corso...</div>
    <button class="refresh-btn" id="refresh-btn" onclick="loadAllFeeds()">↺ Aggiorna</button>
  </div>
  <div id="feed-container"></div>
</div>

<script>
// ─────────────────────────────────────────────────────────
// FONTI: Google News RSS per query tematiche energetiche
// Questi feed sono accessibili direttamente dal browser
// senza necessità di proxy CORS.
//
// Come aggiungere/modificare una fonte:
//   { label: "Nome visualizzato", query: "parole chiave", dot: "colore-dot" }
// ─────────────────────────────────────────────────────────
const FEEDS = [
  // Testate italiane (indicizzate su Google News)
  { label: "Staffetta Quotidiana",  query: "Staffetta Quotidiana energia",        dot: "orange" },
  { label: "Quotidiano Energia",    query: "Quotidiano Energia mercato",           dot: "orange" },
  { label: "QualEnergia",           query: "QualEnergia rinnovabili",              dot: "orange" },
  { label: "Rinnovabili.it",        query: "site:rinnovabili.it",                  dot: "orange" },
  { label: "Energia Italia News",   query: "transizione energetica Italia CER",    dot: "orange" },
  // Istituzioni italiane
  { label: "ARERA",                 query: "ARERA delibera tariffe energia",       dot: "blue" },
  { label: "GME – Prezzi",          query: "GME PUN PSV prezzi elettricità gas",   dot: "blue" },
  { label: "GSE",                   query: "GSE incentivi rinnovabili fotovoltaico",dot: "blue" },
  { label: "Gazzetta Ufficiale",    query: "Gazzetta Ufficiale decreto energia",   dot: "blue" },
  // Prezzi e mercati
  { label: "Prezzo Gas & Luce",     query: "prezzo gas elettricità Italia mercato",dot: "green" },
  { label: "TTF & PUN",             query: "TTF PUN PSV quotazioni gas elettricità",dot: "green" },
  { label: "Bollette & Tariffe",    query: "bollette luce gas tariffe 2026",       dot: "green" },
  // Normativa
  { label: "Normativa Energia",     query: "decreto legge energia normativa 2026", dot: "yellow" },
  { label: "FER & Rinnovabili",     query: "FER decreto rinnovabili incentivi",    dot: "yellow" },
  // Europa
  { label: "ACER – Europa",         query: "ACER mercato europeo energia regolazione", dot: "purple" },
  { label: "IEA",                   query: "IEA energia Europa 2026",              dot: "purple" },
  { label: "EU Energy Policy",      query: "Commissione Europea energia REPowerEU", dot: "purple" },
  { label: "S&P Global Energia",    query: "S&P Global Platts energia gas Europa", dot: "purple" },
];

// ─────────────────────────────────────────────────────────
// Costruisce l'URL del feed Google News RSS
// ─────────────────────────────────────────────────────────
function googleNewsUrl(query) {
  return `https://news.google.com/rss/search?q=${encodeURIComponent(query)}&hl=it&gl=IT&ceid=IT:it`;
}

let allArticles = [];

// ─── Utility ───
function stripHtml(html) {
  const d = document.createElement("div");
  d.innerHTML = html || "";
  return d.textContent || d.innerText || "";
}

function timeAgo(date) {
  if (!date || isNaN(date)) return "";
  const diff = Math.floor((Date.now() - date) / 60000);
  if (diff < 1)    return "Adesso";
  if (diff < 60)   return diff + "min fa";
  if (diff < 1440) return Math.floor(diff / 60) + "h fa";
  return date.toLocaleDateString("it-IT", { day: "2-digit", month: "short" });
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;")
    .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

// ─── Skeleton ───
function showSkeletons() {
  document.getElementById("feed-container").innerHTML =
    `<div class="loading-grid">` +
    Array(10).fill(0).map(() => `
      <div class="skeleton skeleton-card">
        <div class="skeleton-line" style="height:9px;width:28%"></div>
        <div class="skeleton-line" style="height:14px;width:82%"></div>
        <div class="skeleton-line" style="height:11px;width:55%"></div>
      </div>`).join('') +
    `</div>`;
}

// ─── Fetch un singolo feed Google News ───
async function fetchFeed(feed) {
  const url = googleNewsUrl(feed.query);
  try {
    // Google News RSS è accessibile direttamente dal browser (no CORS)
    const res = await fetch(url, { mode: "no-cors" });
    // no-cors restituisce opaque response — usiamo un parser via DOMParser
    // Per aggirare il limite, usiamo un iframe nascosto + MessageChannel oppure
    // il vecchio trucco del feed tramite Google Feed API (deprecato).
    // La soluzione più affidabile: leggiamo il feed tramite allorigins
    // con il parametro charset=utf-8
    throw new Error("need proxy");
  } catch {
    // Fallback: allorigins con parsing JSON
    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}&charset=utf-8`;
    const res = await fetch(proxyUrl);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (!data.contents) throw new Error("empty");

    const xml = new DOMParser().parseFromString(data.contents, "text/xml");
    const items = [...xml.querySelectorAll("item")];

    return items.slice(0, 6).map(item => {
      const title = item.querySelector("title")?.textContent?.trim() || "Senza titolo";
      const link  = item.querySelector("link")?.textContent?.trim() || "#";
      const pub   = item.querySelector("pubDate")?.textContent?.trim() || "";
      const desc  = item.querySelector("description")?.textContent?.trim() || "";
      // Google News nasconde la fonte nel tag <source> o nel titolo (es. "Titolo - Fonte")
      const sourceEl = item.querySelector("source");
      const sourceName = sourceEl?.textContent?.trim() || feed.label;
      // Rimuovi "- NomeFonte" finale dal titolo se presente
      const cleanTitle = title.replace(/\s*[-–]\s*[^-–]+$/, "").trim() || title;

      return {
        title:   cleanTitle,
        link,
        desc:    stripHtml(desc).slice(0, 200),
        date:    pub ? new Date(pub) : null,
        source:  sourceName,
        dot:     feed.dot,
        feedLabel: feed.label,
      };
    });
  }
}

// ─── Render ───
function renderArticles() {
  const container = document.getElementById("feed-container");

  if (!allArticles.length) {
    container.innerHTML = `
      <div class="empty-state">
        Nessun articolo caricato.<br>
        Controlla la connessione e riprova con il pulsante Aggiorna.
      </div>`;
    return;
  }

  // Deduplicazione per titolo (Google News può restituire duplicati tra query)
  const seen = new Set();
  const unique = allArticles.filter(a => {
    const key = a.title.toLowerCase().slice(0, 60);
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });

  container.innerHTML =
    `<div class="articles-grid">` +
    unique.map(a => `
      <a class="article-card" href="${escHtml(a.link)}" target="_blank" rel="noopener noreferrer">
        <div>
          <div class="article-source-tag">
            <span class="dot dot-${a.dot}"></span>${escHtml(a.source)}
          </div>
          <div class="article-title">${escHtml(a.title)}</div>
          ${a.desc ? `<div class="article-desc">${escHtml(a.desc)}</div>` : ''}
        </div>
        <div class="article-meta">
          <div class="article-date">${timeAgo(a.date)}</div>
          <div class="article-arrow">→</div>
        </div>
      </a>`).join('') +
    `</div>`;
}

// ─── Carica tutti i feed ───
async function loadAllFeeds() {
  const btn = document.getElementById("refresh-btn");
  btn.classList.add("loading");
  btn.textContent = "↺ Carico...";
  showSkeletons();
  document.getElementById("status-info").textContent = "Caricamento in corso...";

  const results = await Promise.allSettled(FEEDS.map(fetchFeed));

  allArticles = results
    .flatMap(r => r.status === "fulfilled" ? r.value : [])
    .filter(a => a.link && a.link !== "#")
    .sort((a, b) => (b.date || 0) - (a.date || 0));

  const now = new Date().toLocaleTimeString("it-IT", { hour: "2-digit", minute: "2-digit" });
  const total = allArticles.length;

  document.getElementById("status-info").innerHTML =
    `<strong>${total}</strong> articoli · aggiornato alle <strong>${now}</strong>`;
  document.getElementById("total-badge").textContent = total + " articoli";

  renderArticles();

  btn.classList.remove("loading");
  btn.textContent = "↺ Aggiorna";
}

// ─── Init ───
loadAllFeeds();
setInterval(loadAllFeeds, 15 * 60 * 1000);
</script>
</body>
</html>
