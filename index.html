<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rassegna Energia Italia</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0e1a;
      --surface: #111827;
      --surface2: #1a2235;
      --border: #1e2d45;
      --accent: #f97316;
      --accent2: #38bdf8;
      --accent3: #a3e635;
      --text: #e2e8f0;
      --text-muted: #64748b;
      --text-dim: #94a3b8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(56,189,248,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(56,189,248,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* HEADER */
    header {
      position: relative;
      z-index: 10;
      padding: 2.5rem 2rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      background: linear-gradient(180deg, rgba(249,115,22,0.06) 0%, transparent 100%);
    }

    .logo-area h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      letter-spacing: -0.03em;
      line-height: 1.1;
      color: #fff;
    }

    .logo-area h1 span { color: var(--accent); }

    .logo-area p {
      margin-top: 0.4rem;
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 300;
      letter-spacing: 0.04em;
    }

    .header-meta {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .badge {
      font-family: 'Syne', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.3rem 0.7rem;
      border-radius: 2px;
      border: 1px solid;
    }

    .badge-live {
      color: var(--accent3);
      border-color: var(--accent3);
      animation: pulse-badge 2s ease-in-out infinite;
    }

    @keyframes pulse-badge {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .badge-count {
      color: var(--accent2);
      border-color: var(--accent2);
    }

    /* MAIN */
    .feed-area {
      position: relative;
      z-index: 1;
      padding: 1.5rem 2rem 4rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    /* STATUS BAR */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    .status-info {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .status-info strong { color: var(--text); font-weight: 500; }

    .refresh-btn {
      font-family: 'Syne', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent2);
      background: none;
      border: 1px solid var(--accent2);
      padding: 0.4rem 0.9rem;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .refresh-btn:hover { background: var(--accent2); color: var(--bg); }

    /* SKELETON */
    .loading-grid { display: grid; gap: 1px; }

    .skeleton {
      background: var(--surface);
      animation: shimmer 1.5s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    .skeleton-card {
      height: 100px;
      border-left: 3px solid var(--border);
      padding: 1rem 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .skeleton-line {
      border-radius: 3px;
      background: var(--border);
    }

    /* ARTICLES */
    .articles-grid {
      display: grid;
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
    }

    .article-card {
      background: var(--surface);
      padding: 1.1rem 1.3rem;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.5rem;
      transition: background 0.15s;
      text-decoration: none;
      color: inherit;
    }

    .article-card:hover { background: var(--surface2); }

    .article-source-tag {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-family: 'Syne', sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.4rem;
    }

    .article-source-tag .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
    }

    .article-title {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      line-height: 1.4;
      color: var(--text);
      margin-bottom: 0.3rem;
    }

    .article-desc {
      font-size: 0.78rem;
      color: var(--text-muted);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .article-meta { text-align: right; flex-shrink: 0; }

    .article-date {
      font-size: 0.72rem;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .article-arrow {
      margin-top: 0.5rem;
      color: var(--border);
      font-size: 1rem;
      transition: color 0.15s;
    }

    .article-card:hover .article-arrow { color: var(--accent); }

    /* Category dot colors */
    .dot-testate      { background: #f97316; }
    .dot-istituzioni  { background: #38bdf8; }
    .dot-europee      { background: #a78bfa; }
    .dot-prezzi       { background: #a3e635; }

    /* EMPTY / ERROR */
    .empty-state {
      padding: 4rem 2rem;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    /* RESPONSIVE */
    @media (max-width: 600px) {
      header { padding: 1.5rem 1rem 1rem; }
      .feed-area { padding: 1rem 1rem 3rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-area">
    <h1>⚡ Rassegna <span>Energia</span> Italia</h1>
    <p>Aggregatore notizie · Mercati energetici · Aggiornamento in tempo reale</p>
  </div>
  <div class="header-meta">
    <span class="badge badge-live">● Live</span>
    <span class="badge badge-count" id="total-badge">— articoli</span>
  </div>
</header>

<div class="feed-area">
  <div class="status-bar">
    <div class="status-info" id="status-info">Caricamento in corso...</div>
    <button class="refresh-btn" onclick="loadAllFeeds()">↺ Aggiorna</button>
  </div>
  <div id="feed-container">
    <div class="loading-grid" id="loading-skeleton"></div>
  </div>
</div>

<script>
const FEEDS = [
  // Testate Italiane
  { title: "Staffetta Quotidiana",  url: "https://www.staffettaonline.com/rss.aspx",                         color: "testate" },
  { title: "Quotidiano Energia",    url: "https://www.quotidianoenergia.it/feed/",                           color: "testate" },
  { title: "QualEnergia",           url: "https://www.qualenergia.it/feed/",                                 color: "testate" },
  { title: "Rinnovabili.it",        url: "https://www.rinnovabili.it/feed/",                                 color: "testate" },
  { title: "Energia Italia News",   url: "https://www.energiaitalia.news/feed/",                             color: "testate" },
  { title: "Energia Mercato",       url: "https://www.energiamercato.it/feed/",                              color: "testate" },
  // Istituzioni Italiane
  { title: "ARERA",                 url: "https://www.arera.it/rss/ultimenotizie.xml",                       color: "istituzioni" },
  { title: "GME",                   url: "https://www.mercatoelettrico.org/it/news/rss.aspx",                color: "istituzioni" },
  { title: "GSE",                   url: "https://www.gse.it/notizie-ed-eventi/news/rss",                   color: "istituzioni" },
  { title: "Gazzetta Ufficiale",    url: "https://www.gazzettaufficiale.it/dynamicajax/pages/guri/rss.jsp?categoria=5", color: "istituzioni" },
  // Europee & Internazionali
  { title: "ACER",                  url: "https://www.acer.europa.eu/rss.xml",                               color: "europee" },
  { title: "IEA",                   url: "https://www.iea.org/rss/news.xml",                                 color: "europee" },
  { title: "EU Commission Energy",  url: "https://energy.ec.europa.eu/news/rss_en",                         color: "europee" },
  { title: "S&P Global / Platts",   url: "https://www.spglobal.com/commodityinsights/en/rss-feed",          color: "europee" },
  // Prezzi & Mercati
  { title: "Abbassa Le Bollette",   url: "https://www.abbassalebollette.it/feed/",                           color: "prezzi" },
  { title: "Investing.com Energia", url: "https://it.investing.com/rss/news_14.rss",                        color: "prezzi" },
];

const PROXIES = [
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://thingproxy.freeboard.io/fetch/${url}`,
];

let allArticles = [];

// Mostra scheletri
function showSkeletons() {
  const sk = document.getElementById("loading-skeleton");
  sk.innerHTML = Array(8).fill(0).map(() => `
    <div class="skeleton skeleton-card">
      <div class="skeleton-line" style="height:9px;width:28%"></div>
      <div class="skeleton-line" style="height:14px;width:82%"></div>
      <div class="skeleton-line" style="height:11px;width:55%"></div>
    </div>`).join('');
  sk.style.display = "grid";
  document.getElementById("feed-container").innerHTML = '';
  document.getElementById("feed-container").appendChild(sk);
}

async function fetchWithFallback(url) {
  for (const makeProxy of PROXIES) {
    try {
      const res = await fetch(makeProxy(url), { signal: AbortSignal.timeout(8000) });
      if (!res.ok) continue;
      const text = await res.text();
      if (text && text.length > 100) return text;
    } catch (e) { /* prossimo proxy */ }
  }
  return null;
}

async function fetchFeed(feed) {
  try {
    const text = await fetchWithFallback(feed.url);
    if (!text) throw new Error("proxy falliti");
    const xml = new DOMParser().parseFromString(text, "application/xml");
    const items = [...xml.querySelectorAll("item"), ...xml.querySelectorAll("entry")];
    return items.slice(0, 8).map(item => ({
      title:  item.querySelector("title")?.textContent?.trim() || "Senza titolo",
      link:   item.querySelector("link")?.getAttribute("href") || item.querySelector("link")?.textContent?.trim() || "#",
      desc:   stripHtml(item.querySelector("description, summary, content")?.textContent || "").slice(0, 180),
      date:   parseDate(item.querySelector("pubDate, published, updated")?.textContent || ""),
      source: feed.title,
      color:  feed.color,
    }));
  } catch (e) {
    console.warn("Feed non disponibile:", feed.title, e.message);
    return [];
  }
}

function stripHtml(html) {
  const d = document.createElement("div");
  d.innerHTML = html;
  return d.textContent || d.innerText || "";
}

function parseDate(str) {
  if (!str) return null;
  try { return new Date(str); } catch { return null; }
}

function formatDate(d) {
  if (!d || isNaN(d)) return "";
  const diff = Math.floor((Date.now() - d) / 60000);
  if (diff < 1)    return "Adesso";
  if (diff < 60)   return diff + " min fa";
  if (diff < 1440) return Math.floor(diff / 60) + "h fa";
  return d.toLocaleDateString("it-IT", { day: "2-digit", month: "short" });
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;")
    .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function renderArticles() {
  const container = document.getElementById("feed-container");

  if (!allArticles.length) {
    container.innerHTML = `<div class="empty-state">Nessun articolo disponibile al momento.<br>Alcuni feed potrebbero non essere raggiungibili.</div>`;
    return;
  }

  container.innerHTML = `<div class="articles-grid">` +
    allArticles.map(a => `
      <a class="article-card" href="${escHtml(a.link)}" target="_blank" rel="noopener">
        <div>
          <div class="article-source-tag">
            <span class="dot dot-${a.color}"></span>${escHtml(a.source)}
          </div>
          <div class="article-title">${escHtml(a.title)}</div>
          ${a.desc ? `<div class="article-desc">${escHtml(a.desc)}</div>` : ''}
        </div>
        <div class="article-meta">
          <div class="article-date">${formatDate(a.date)}</div>
          <div class="article-arrow">→</div>
        </div>
      </a>`).join('') +
  `</div>`;
}

async function loadAllFeeds() {
  showSkeletons();
  document.getElementById("status-info").textContent = "Caricamento in corso...";

  const results = await Promise.allSettled(FEEDS.map(fetchFeed));
  allArticles = results
    .flatMap(r => r.status === "fulfilled" ? r.value : [])
    .filter(a => a.link !== "#")
    .sort((a, b) => (b.date || 0) - (a.date || 0));

  const now = new Date().toLocaleTimeString("it-IT", { hour: "2-digit", minute: "2-digit" });
  document.getElementById("status-info").innerHTML =
    `<strong>${allArticles.length}</strong> articoli · aggiornato alle <strong>${now}</strong>`;
  document.getElementById("total-badge").textContent = allArticles.length + " articoli";

  renderArticles();
}

// Init
loadAllFeeds();
setInterval(loadAllFeeds, 15 * 60 * 1000);
</script>
</body>
</html>
